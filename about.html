<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보 ― 망원 클럽 룩북</title>
  <meta name="description" content="망원 클럽의 진짜 씬, 브루탈리즘 패션의 철학, 그리고 여기서 살아남는 법. 정보 페이지에서 모든 걸 까발린다.">
  <meta name="keywords" content="망원 클럽 정보, 망원동 클럽 씬, 브루탈리즘 스트리트, 클럽 패션 정보, 망원 룩북 정보, 스트리트 웨어 철학">
  <meta name="bpaas-design-system" content="brutalist-avantgarde">
  <meta name="bpaas-design-theme" content="kr-raw-concrete">
  <link rel="canonical" href="https://t3b06-mw-club-look-1.vercel.app/info">
  <meta property="og:title" content="정보 — 망원 클럽 룩북">
  <meta property="og:description" content="가식 없는 정보. 망원에서 진짜 놀고 싶다면 이 페이지가 기준이다.">
  <meta property="og:type" content="website">
  <style>
    /* === BRUTALIST RESET === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #e5e5e5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500;
      line-height: 1.6;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: #f5f5f5;
    }

    h1 { font-size: clamp(2.2rem, 6vw, 4.2rem); margin-bottom: 0.5rem; }
    h2 { font-size: clamp(1.8rem, 4vw, 3rem); margin-bottom: 0.75rem; border-left: 6px solid #ff2a2a; padding-left: 1rem; }
    h3 { font-size: clamp(1.3rem, 3vw, 2rem); margin-bottom: 0.5rem; }
    p { margin-bottom: 1.2rem; font-size: 1.05rem; max-width: 70ch; }
    a { color: #ff2a2a; text-decoration: underline wavy; text-underline-offset: 4px; }
    a:hover { color: #ffffff; background: #ff2a2a; text-decoration: none; }
    strong { color: #ff2a2a; font-weight: 900; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 1rem;
      }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.6rem; border-left-width: 4px; }
    }

    /* ---- HEADER / NAV (햄버거 포함) ---- */
    header {
      background: #1a1a1a;
      border-bottom: 4px solid #ff2a2a;
      padding: 0.75rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #ff2a2a;
      text-decoration: none;
      text-transform: uppercase;
      line-height: 1;
    }

    .logo span {
      color: #f5f5f5;
    }

    /* 네비게이션 링크 (데스크톱) */
    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      color: #e5e5e5;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-decoration: none;
      padding: 0.4rem 0;
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s;
    }

    nav a:hover {
      border-bottom-color: #ff2a2a;
      background: transparent;
      color: #ff2a2a;
    }

    nav a.active {
      border-bottom-color: #ff2a2a;
      color: #ff2a2a;
    }

    /* 전화 링크 (헤더 내) */
    .tel-link {
      background: #ff2a2a;
      color: #0d0d0d !important;
      padding: 0.5rem 1.2rem !important;
      border-radius: 0;
      font-weight: 900;
      font-size: 0.9rem;
      border: none !important;
    }

    .tel-link:hover {
      background: #f5f5f5 !important;
      color: #0d0d0d !important;
    }

    /* 햄버거 메뉴 토글 (체크박스 해킹) */
    .hamburger-toggle {
      display: none;
    }

    .hamburger-label {
      display: none;
      flex-direction: column;
      cursor: pointer;
      padding: 0.5rem;
    }

    .hamburger-label span {
      width: 30px;
      height: 3px;
      background: #f5f5f5;
      margin: 4px 0;
      transition: all 0.3s;
    }

    /* 모바일 메뉴 (숨김) */
    .mobile-nav {
      display: none;
      background: #1a1a1a;
      border-top: 2px solid #ff2a2a;
      padding: 1rem 1.5rem;
    }

    .mobile-nav a {
      display: block;
      color: #e5e5e5;
      text-transform: uppercase;
      font-weight: 700;
      padding: 0.8rem 0;
      border-bottom: 1px solid #333;
      text-decoration: none;
    }

    .mobile-nav a:last-child {
      border-bottom: none;
    }

    .mobile-nav a.active {
      color: #ff2a2a;
    }

    @media (max-width: 768px) {
      .header-inner {
        padding: 0 1rem;
      }

      nav {
        display: none;
      }

      .hamburger-label {
        display: flex;
      }

      .hamburger-toggle:checked ~ .mobile-nav {
        display: block;
      }

      .hamburger-toggle:checked + .hamburger-label span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
      }
      .hamburger-toggle:checked + .hamburger-label span:nth-child(2) {
        opacity: 0;
      }
      .hamburger-toggle:checked + .hamburger-label span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
      }
    }

    /* ---- 콘텐츠 전용 스타일 ---- */
    .info-section {
      padding: 3rem 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .info-section:last-of-type {
      border-bottom: none;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .info-card {
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      padding: 1.8rem;
      transition: border-color 0.3s, transform 0.2s;
    }

    .info-card:hover {
      border-color: #ff2a2a;
      transform: translateY(-4px);
    }

    .info-card h3 {
      margin-bottom: 1rem;
    }

    .info-card p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .quote-block {
      background: #111;
      border-left: 8px solid #ff2a2a;
      padding: 2rem;
      margin: 2rem 0;
      font-style: italic;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f5f5f5;
      text-transform: uppercase;
    }

    .faq-item {
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed #333;
      padding-bottom: 1.5rem;
    }

    .faq-item:last-child {
      border-bottom: none;
    }

    .faq-q {
      font-weight: 800;
      color: #ff2a2a;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 4px solid #ff2a2a;
      margin-top: 3rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
    }

    @media (max-width: 768px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
      .quote-block {
        font-size: 1.1rem;
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">MW<span>CLUB</span></a>
    <input type="checkbox" id="hamburger" class="hamburger-toggle">
    <label for="hamburger" class="hamburger-label">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <nav>
      <a
</body>
</html>
